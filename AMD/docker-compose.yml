# ComfyUI Docker Compose File by John Aldred
# http://www.johnaldred.com
# http://github.com/kaouthia
# 
# Updated to use AMD with ROCm by Colbix
# https://github.com/Colbix/ComfyUI-Docker

services:
  comfyk:
    build:
      dockerfile: Dockerfile
    image: comfyui:latest
    container_name: comfyui
    ports:
      - "8188:8188"
    volumes:
      # persist your models, output, and settings:
      - /home/username/comfyui/models:/app/ComfyUI/models

      # persist your output images:
      - /home/username/comfyui/output:/app/ComfyUI/output

      # persist all your settings & extra nodes:
      - /home/username/comfyui/settings:/app/ComfyUI/user/default:rw

      # persist just your saved flows (overrides the workflows/ in default):
      - /home/username/comfyui/flows:/app/ComfyUI/user/default/workflows:rw

     # Add the container's non-root user to additional container groups which will be used to access
     # the Kernel Fusion Driver and Direct Rendering Interface
    group_add:
      - video
      - render
     # Add devices from the host system that should be accessible to the container
     # See https://rocm.docs.amd.com/projects/install-on-linux/en/latest/how-to/docker.html#accessing-gpus-in-containers
    devices:
      - /dev/kfd
      - /dev/dri
    security_opt:
      - seccomp=unconfined

    stdin_open: true
    tty: true
    restart: unless-stopped
